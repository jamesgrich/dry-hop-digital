<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 100">

  <!-- Background (transparent — works on dark or light) -->

  <!-- Icon — hexagon -->
  <polygon points="50,8 82,26 82,62 50,80 18,62 18,26"
    fill="rgba(143,173,136,0.07)"/>
  <polygon points="50,8 82,26 82,62 50,80 18,62 18,26"
    fill="none" stroke="#8fad88" stroke-width="2" stroke-linejoin="round"/>

  <!-- Tap body -->
  <rect x="44.5" y="18" width="11" height="45" rx="3.5" fill="#8fad88"/>
  <!-- Lever arm -->
  <rect x="54" y="31" width="19" height="5" rx="2.5" fill="#8fad88"/>
  <!-- Knob -->
  <circle cx="75" cy="33.5" r="5.5" fill="#8fad88"/>
  <circle cx="75" cy="33.5" r="3" fill="#4a6b44"/>
  <!-- Base -->
  <rect x="39" y="61" width="22" height="5" rx="2.5" fill="#8fad88"/>
  <!-- Spout -->
  <path d="M 48 66 L 47 77 Q 50 79.5 53 77 L 52 66 Z" fill="#8fad88"/>

  <!-- Wordmark -->
  <text x="100" y="60"
    font-family="'Bebas Neue', 'Arial Black', Impact, sans-serif"
    font-size="52" font-weight="400" fill="#ffffff"
    letter-spacing="2">DRY HOP DIGITAL</text>

  <!-- Tagline -->
  <text x="101" y="80"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="13" font-weight="400" fill="#888888"
    letter-spacing="2.5">WHERE CRAFT MEETS CODE</text>

</svg>
