<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">

  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="#0d0d0d"/>

  <!-- Hexagon inner glow -->
  <polygon points="100,26 164,63 164,137 100,174 36,137 36,63"
    fill="rgba(212,168,67,0.07)"/>

  <!-- Hexagon outline -->
  <polygon points="100,26 164,63 164,137 100,174 36,137 36,63"
    fill="none" stroke="#d4a843" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Tap body -->
  <rect x="91" y="52" width="18" height="72" rx="6" fill="#d4a843"/>

  <!-- Lever arm -->
  <rect x="107" y="73" width="30" height="7" rx="3.5" fill="#d4a843"/>

  <!-- Lever knob -->
  <circle cx="140" cy="76.5" r="8" fill="#d4a843"/>
  <circle cx="140" cy="76.5" r="4.5" fill="#8a6015"/>

  <!-- Drip tray base -->
  <rect x="80" y="121" width="40" height="8" rx="4" fill="#d4a843"/>

  <!-- Spout -->
  <path d="M 97 129 L 95 146 Q 100 150 105 146 L 103 129 Z" fill="#d4a843"/>

  <!-- Subtle circuit dot on body -->
  <circle cx="100" cy="90" r="2.5" fill="#8a6015"/>
  <circle cx="100" cy="102" r="2.5" fill="#8a6015"/>

</svg>
