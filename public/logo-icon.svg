<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">

  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="#0d0d0d"/>

  <!-- Hexagon inner glow -->
  <polygon points="100,26 164,63 164,137 100,174 36,137 36,63"
    fill="rgba(143,173,136,0.07)"/>

  <!-- Hexagon outline -->
  <polygon points="100,26 164,63 164,137 100,174 36,137 36,63"
    fill="none" stroke="#8fad88" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Tap body -->
  <rect x="91" y="52" width="18" height="72" rx="6" fill="#8fad88"/>

  <!-- Lever arm -->
  <rect x="107" y="73" width="30" height="7" rx="3.5" fill="#8fad88"/>

  <!-- Lever knob -->
  <circle cx="140" cy="76.5" r="8" fill="#8fad88"/>
  <circle cx="140" cy="76.5" r="4.5" fill="#4a6b44"/>

  <!-- Drip tray base -->
  <rect x="80" y="121" width="40" height="8" rx="4" fill="#8fad88"/>

  <!-- Spout -->
  <path d="M 97 129 L 95 146 Q 100 150 105 146 L 103 129 Z" fill="#8fad88"/>

  <!-- Subtle circuit dot on body -->
  <circle cx="100" cy="90" r="2.5" fill="#4a6b44"/>
  <circle cx="100" cy="102" r="2.5" fill="#4a6b44"/>

</svg>
